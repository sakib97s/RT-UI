@if (isVisible) {

<!-- Sticky Contact Number - Beautiful Design -->
@if (shopInfo?.phones?.length && shouldShowStickyContact) {
<div class="sticky-contact-number">
  <a href="tel:{{shopInfo?.phones[0]?.value}}" class="sticky-phone-link"
    aria-label="Call {{ shopInfo?.phones[0]?.value }}">
    <div class="phone-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22" fill="currentColor">
        <path
          d="M798-120q-125 0-247-54.5T329-329Q229-429 174.5-551T120-798q0-18 12-30t30-12h162q14 0 25 9.5t13 22.5l26 140q2 16-1 27t-11 19l-97 98q20 37 47.5 71.5T387-386q31 31 65 57.5t72 48.5l94-94q9-9 23.5-13.5T670-390l138 28q14 4 23 14.5t9 23.5v162q0 18-12 30t-30 12Z" />
      </svg>
    </div>
    <span class="phone-text">{{ shopInfo?.phones[0]?.value }}</span>
    <div class="pulse-ring"></div>
  </a>
</div>
}

<div class="footer-xl-container">

  <app-footer-xl-1 [shopInfo]="shopInfo"></app-footer-xl-1>


</div>

<!-- <app-social-chat [shopInfo]="shopInfo" [chatLink]="chatLink"></app-social-chat> -->
}
