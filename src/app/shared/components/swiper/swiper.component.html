<div class="slider">
  @if (navigation) {
    <button
      class="slider__button slider__button--prev"
      (click)="slide('prev')"
      [disabled]="!loop && currentIndex === 0"
      aria-label="Previous slide">
      ❮
    </button>
  }

  <div class="slider__container">
    <div
      #sliderTrack
      class="slider__track"
      (mousedown)="startDragging($event)"
      (touchstart)="startDragging($event)">
      <ng-content></ng-content>
    </div>
  </div>

  @if (navigation) {
    <button
      class="slider__button slider__button--next"
      (click)="slide('next')"
      [disabled]="!loop && currentIndex >= maxIndex"
      aria-label="Next slide">
      ❯
    </button>
  }

  @if (pagination) {
    <div class="slider__pagination">
      @for (_ of [].constructor(totalPages); track _; let i = $index) {
        <div
          class="dot"
          [class.dot--active]="i === currentPage"
          (click)="goToPage(i)">
        </div>
      }
    </div>
  }
</div>
